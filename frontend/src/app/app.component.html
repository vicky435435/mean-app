<!-- Authenticated Layout -->
<div class="app-layout" *ngIf="authService.isAuthenticated(); else authView">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">📦</span>
      <span class="brand-name">MEAN Store</span>
    </div>

    <ul class="nav-menu">
      <li>
        <a routerLink="/dashboard" routerLinkActive="active">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </a>
      </li>
      <li>
        <a routerLink="/products" routerLinkActive="active">
          <span class="nav-icon">📦</span>
          <span class="nav-label">Products</span>
        </a>
      </li>
      <li>
        <a routerLink="/orders" routerLinkActive="active">
          <span class="nav-icon">🛒</span>
          <span class="nav-label">Orders</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar">{{ getUserInitial() }}</div>
        <div class="user-info">
          <span class="user-name">{{ authService.currentUser?.username }}</span>
          <span class="user-role">Store User</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">
        <span>⬅</span> Logout
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>

<!-- Unauthenticated View -->
<ng-template #authView>
  <router-outlet></router-outlet>
</ng-template>
